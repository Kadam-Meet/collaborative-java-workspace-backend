server.port=${PORT:8081}
server.servlet.context-path=/
spring.application.name=collaborative-java-workspace-backend
spring.config.import=optional:file:.env[.properties]

backend.events.enabled=true
backend.events.port=9091
backend.rmi.enabled=true
backend.rmi.host=127.0.0.1
backend.rmi.port=1099
backend.rmi.service-name=JavaWorkspaceAnalysisService

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false