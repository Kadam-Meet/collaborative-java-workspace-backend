server.port=${PORT}
server.servlet.context-path=/
spring.application.name=collaborative-java-workspace-backend
spring.config.import=optional:file:.env[.properties]

backend.events.enabled=true
backend.events.port=9091
backend.rmi.enabled=true
backend.rmi.host=127.0.0.1
backend.rmi.port=1099
backend.rmi.service-name=JavaWorkspaceAnalysisService

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://collaborative-java-workspace-frontend.onrender.com,http://localhost:*,http://127.0.0.1:*}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://collaborative-java-workspace-frontend.onrender.com}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:60}
app.invitation.expiration-hours=${APP_INVITATION_EXPIRATION_HOURS:72}